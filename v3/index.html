<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Robin · SonicBrand</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --card: #141414; --border: rgba(255,255,255,0.08);
      --text: #f0f0f0; --muted: rgba(255,255,255,0.45); --accent: #1DB954; --r: 20px;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh; display: flex; align-items: center;
      justify-content: center; padding: 24px 16px;
    }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 40px 32px; max-width: 400px;
      width: 100%; text-align: center;
    }
    .logo {
      width: 72px; height: 72px;
      background: linear-gradient(135deg,#1DB954,#158a3e);
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 32px; margin: 0 auto 24px;
    }
    h1 { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
    .sub { color: var(--muted); font-size: 15px; line-height: 1.5; margin-bottom: 36px; }
    .btn-spotify {
      width: 100%; background: #1DB954; color: #fff; border: none;
      border-radius: 50px; padding: 16px 24px; font-size: 16px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 12px; transition: transform .15s, box-shadow .15s; font-family: inherit;
    }
    .btn-spotify:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(29,185,84,.4); }
    .btn-spotify:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .sp-icon { width: 22px; height: 22px; flex-shrink: 0; }
    .user-card {
      display: flex; align-items: center; gap: 16px;
      background: rgba(29,185,84,.08); border: 1px solid rgba(29,185,84,.25);
      border-radius: 14px; padding: 16px 20px; margin-bottom: 24px; text-align: right;
    }
    .user-avatar {
      width: 52px; height: 52px; border-radius: 50%; object-fit: cover;
      background: #333; flex-shrink: 0; border: 2px solid rgba(29,185,84,.4);
    }
    .user-name { font-size: 17px; font-weight: 800; }
    .user-label { font-size: 12px; color: var(--accent); font-weight: 600; margin-top: 2px; }
    .btn-next {
      width: 100%; background: var(--accent); color: #fff; border: none;
      border-radius: 50px; padding: 16px 24px; font-size: 16px; font-weight: 700;
      cursor: pointer; font-family: inherit; margin-bottom: 12px; transition: transform .15s;
    }
    .btn-next:hover { transform: translateY(-1px); }
    .btn-switch {
      background: none; border: none; color: var(--muted); font-size: 13px;
      cursor: pointer; font-family: inherit; text-decoration: underline;
    }
    .btn-switch:hover { color: var(--text); }
    .error-box {
      display: none; background: rgba(255,60,0,.08); border: 1px solid rgba(255,60,0,.3);
      border-radius: 12px; padding: 16px; font-size: 13px; line-height: 1.8;
      margin-bottom: 16px; text-align: right;
    }
    .error-box.show { display: block; }
    .error-box a { color: var(--accent); }
    .loading { color: var(--muted); font-size: 14px; margin-top: 14px; display: none; }
    .loading.show { display: block; }
    .brand { margin-top: 32px; font-size: 11px; color: rgba(255,255,255,.18); }
  </style>
</head>
<body>
<div class="card">

  <!-- Login screen -->
  <div id="sLogin">
    <div class="logo">🎵</div>
    <h1>Robin</h1>
    <p class="sub">בונה פלייליסטים לעסקים.<br>התחברו עם Spotify כדי להתחיל.</p>
    <div class="error-box" id="errBox"></div>
    <button class="btn-spotify" id="loginBtn" onclick="startLogin()">
      <svg class="sp-icon" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
      התחברות עם Spotify
    </button>
    <p class="loading" id="loadTxt">מתחבר…</p>
  </div>

  <!-- Connected screen -->
  <div id="sConnected" style="display:none">
    <div class="logo">✓</div>
    <h1>מחובר!</h1>
    <p class="sub" style="margin-bottom:24px">חשבון Spotify מחובר בהצלחה.</p>
    <div class="user-card">
      <img class="user-avatar" id="uAvatar" src="" alt="">
      <div>
        <div class="user-name" id="uName">—</div>
        <div class="user-label">✓ Spotify מחובר</div>
      </div>
    </div>
    <button class="btn-next" onclick="goNext()">המשך לרובין ←</button><br>
    <button class="btn-switch" onclick="switchAccount()">זה לא אני — החלף חשבון</button>
  </div>

  <p class="brand">SonicBrand · Robin v3</p>
</div>

<script>
const CLIENT_ID = 'b6404b5ae1684143b79d9a86bb4b6cba';
const SCOPES    = 'user-read-private user-read-email playlist-modify-public playlist-modify-private playlist-read-private';
const REDIRECT  = location.origin + '/v3';

async function sha256(s){
  const b=new TextEncoder().encode(s),h=await crypto.subtle.digest('SHA-256',b);
  return new Uint8Array(h);
}
function b64url(a){ return btoa(String.fromCharCode(...a)).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_'); }
function $(id){ return document.getElementById(id); }
function showErr(html){ const e=$('errBox'); e.innerHTML=html; e.classList.add('show'); }
function hideErr(){ $('errBox').classList.remove('show'); }

async function startLogin(){
  hideErr();
  $('loginBtn').disabled=true;
  $('loadTxt').classList.add('show');
  const v=b64url(crypto.getRandomValues(new Uint8Array(32)));
  const c=b64url(await sha256(v));
  localStorage.setItem('sp_v',v);
  sessionStorage.setItem('sp_v',v);
  document.cookie=`sp_v=${v}; path=/; max-age=300; SameSite=Lax`;
  const p=new URLSearchParams({
    client_id:CLIENT_ID, response_type:'code', redirect_uri:REDIRECT,
    scope:SCOPES, code_challenge_method:'S256', code_challenge:c, show_dialog:'true'
  });
  location.href='https://accounts.spotify.com/authorize?'+p;
}

async function handleCallback(){
  const p=new URLSearchParams(location.search);
  history.replaceState({},'','/v3');
  if(p.get('error')){ showErr('חיבור בוטל.'); return; }
  const code=p.get('code'); if(!code) return;
  $('loadTxt').classList.add('show');
  $('loginBtn').disabled=true;
  const v=localStorage.getItem('sp_v')||sessionStorage.getItem('sp_v')||
          (document.cookie.match(/sp_v=([^;]+)/)||[])[1]||'';
  if(!v){ showErr('שגיאת אימות — נסה שוב.'); reset(); return; }
  try{
    const r=await fetch('https://accounts.spotify.com/api/token',{
      method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams({code,redirect_uri:REDIRECT,grant_type:'authorization_code',
                                 client_id:CLIENT_ID,code_verifier:v})
    });
    const t=await r.json();
    if(!t.access_token){ showErr('חיבור נכשל: '+(t.error_description||t.error||'שגיאה')); reset(); return; }
    // Scope validation
    const granted=(t.scope||'').split(' ');
    const missing=['user-read-private','playlist-modify-public','playlist-modify-private']
      .filter(s=>!granted.includes(s));
    if(missing.length){
      showErr(
        '<strong>⚠️ נדרשות הרשאות מעודכנות</strong><br><br>'+
        '1️⃣ פתח <strong>Spotify</strong> באייפון<br>'+
        '2️⃣ הגדרות ← פרטיות ואבטחה ← אפליקציות<br>'+
        '3️⃣ <strong>sonic-brand</strong> ← הסר גישה<br>'+
        '4️⃣ חזור לכאן ולחץ "התחבר מחדש"<br><br>'+
        '<a href="https://www.spotify.com/account/apps" target="_blank">spotify.com/account/apps ←</a>'
      );
      reset('🔄 התחבר מחדש'); return;
    }
    // Save
    localStorage.setItem('sp_access',t.access_token);
    localStorage.setItem('sp_refresh',t.refresh_token||'');
    localStorage.setItem('sp_expiry',String(Date.now()+(t.expires_in||3600)*1000-60000));
    localStorage.removeItem('sp_v'); sessionStorage.removeItem('sp_v');
    await loadUser(t.access_token);
  }catch(e){ showErr('שגיאת רשת: '+e.message); reset(); }
}

async function loadUser(tok){
  try{
    const r=await fetch('https://api.spotify.com/v1/me',{headers:{'Authorization':'Bearer '+tok}});
    const u=await r.json();
    const user={id:u.id,display_name:u.display_name||u.id,image:(u.images&&u.images[0])?u.images[0].url:''};
    localStorage.setItem('sp_user',JSON.stringify(user));
    showConnected(user);
  }catch(e){ showConnected({display_name:'מחובר',image:''}); }
}

function showConnected(u){
  $('sLogin').style.display='none'; $('sConnected').style.display='block';
  $('uName').textContent=u.display_name||u.id||'—';
  if(u.image){ $('uAvatar').src=u.image; } else { $('uAvatar').style.display='none'; }
}

function reset(label){
  $('loginBtn').disabled=false;
  $('loginBtn').innerHTML=`<svg class="sp-icon" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>${label||'התחברות עם Spotify'}`;
  $('loadTxt').classList.remove('show');
}

function switchAccount(){
  ['sp_access','sp_refresh','sp_expiry','sp_user','sp_v'].forEach(k=>{
    localStorage.removeItem(k); try{sessionStorage.removeItem(k);}catch(e){}
  });
  document.cookie='sp_v=; path=/; max-age=0; SameSite=Lax';
  $('sConnected').style.display='none'; $('sLogin').style.display='block'; hideErr();
}

function goNext(){ alert('SSO עובד! ממשיך לרובין...'); }

// Boot
(function(){
  if(new URLSearchParams(location.search).get('code')){ handleCallback(); return; }
  const acc=localStorage.getItem('sp_access'), exp=Number(localStorage.getItem('sp_expiry')||0);
  if(acc && exp>Date.now()){
    const u=JSON.parse(localStorage.getItem('sp_user')||'null');
    if(u){ showConnected(u); return; }
  }
})();
</script>
</body>
</html>
