<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rubin SonicBrands — v4</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <script src="https://open.spotify.com/embed/iframe-api/v1" async></script>
  <style>
    :root {
      --bg: #0a0a0f;
      --bg-2: #10101a;
      --card: #161623;
      --border: rgba(255, 255, 255, .08);
      --border-2: rgba(255, 255, 255, .16);
      --text: #f5f5fa;
      --muted: #9b9bb0;
      --accent: #1DB954;
      --r-md: 14px;
      --r-lg: 22px;
      --shadow-glow: 0 0 30px rgba(29, 185, 84, .18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
    }

    body {
      font-family: 'Heebo', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 18px;
    }

    .app {
      width: 100%;
      max-width: 560px;
    }

    .screen-card {
      background: linear-gradient(180deg, var(--card), var(--bg-2));
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow-glow);
    }

    h1 {
      font-size: 26px;
      font-weight: 800;
      margin: 0 0 6px;
      text-align: center;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin: 0 0 22px;
    }

    .input-wrap {
      margin-bottom: 14px;
    }

    .input-label {
      display: block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .input-text,
    .input-textarea {
      width: 100%;
      background: var(--bg-2);
      border: 1px solid var(--border-2);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: inherit;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color .2s;
      resize: vertical;
    }

    .input-textarea {
      min-height: 180px;
      font-size: 16px;
      border-width: 2px;
      border-color: var(--accent);
    }

    .input-text:focus,
    .input-textarea:focus {
      border-color: var(--accent);
    }

    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: box-shadow .2s, transform .05s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #16a34a);
      color: #fff;
      box-shadow: 0 4px 20px rgba(29, 185, 84, .35);
    }

    .btn-primary:hover {
      box-shadow: 0 6px 24px rgba(29, 185, 84, .5);
    }

    .btn-primary:active {
      transform: translateY(1px);
    }

    .btn-primary:disabled {
      opacity: .55;
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-block {
      width: 100%;
      margin-top: 6px;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      margin-top: 14px;
      text-align: center;
    }

    .preview-loading,
    .preview-empty {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      padding: 32px 8px;
    }

    .preview-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .preview-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin: 18px 0 22px;
    }

    .preview-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--bg-2);
      border: 1px solid var(--border-2);
      border-radius: 14px;
      padding: 10px 12px;
      transition: border-color .2s;
    }

    .preview-card:has(.preview-checkbox:checked) {
      border-color: var(--accent);
    }

    .preview-embed {
      flex: 1 1 auto;
      min-width: 0;
    }

    .preview-embed iframe {
      display: block;
      border-radius: 12px;
    }

    .preview-check-wrap {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      cursor: pointer;
    }

    .preview-checkbox {
      width: 22px;
      height: 22px;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .atmo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 18px 0 22px;
    }

    @media (max-width: 480px) {
      .atmo-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .atmo-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-2);
      border: 1px solid var(--border-2);
      border-radius: 12px;
      padding: 10px 12px;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      user-select: none;
    }

    .atmo-chip:has(.atmo-checkbox:checked) {
      border-color: var(--accent);
      background: rgba(29, 185, 84, .08);
    }

    .atmo-checkbox {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--accent);
      flex: 0 0 auto;
    }

    .atmo-name {
      font-size: 14px;
      color: var(--text);
    }

    .sb-spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, .3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: sb-spin .7s linear infinite;
      vertical-align: middle;
    }

    @keyframes sb-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="screen-card">
      <h1>Rubin SonicBrands — v4</h1>
      <p class="subtitle">בדיקת התאמת סוג עסק</p>

      <div class="input-wrap">
        <label class="input-label" for="bizName">שם העסק</label>
        <input type="text" class="input-text" id="bizName" placeholder="לדוגמה: בר הכפר, קפה לואיז, מסעדת נוני..."
          maxlength="80" autocomplete="off">
      </div>

      <div class="input-wrap">
        <label class="input-label" for="bizDesc">ספרו לנו על העסק</label>
        <textarea class="input-textarea" id="bizDesc"
          placeholder="לדוגמה: בר יין שכונתי בלב תל אביב, עם קהל בני 30+ שבא לשבת ולשוחח. אווירה אינטימית, לא רעשנית..."
          maxlength="1000"></textarea>
      </div>

      <button class="btn btn-primary btn-block" id="submitBtn">המשך ←</button>
      <p class="hint">פתחו את ה-Console כדי לראות את תוצאת ההתאמה</p>
    </div>
  </div>

  <script type="module" src="/v4/app.js?v=04062026f"></script>
</body>

</html>
